<html lang="en">

</head>
<body>
<nav class="sidebar" id="sidebar">
  <div class="sidebar-logo"><div class="logo-emblem"><img src="/PakNikahPoint/assets/logo-pnp.png" alt="PNP Logo" style="width:85px;height:85px;object-fit:contain;filter:drop-shadow(0 2px 8px rgba(201,168,76,0.4));"></div><div class="logo-text"><span class="logo-main">PakNikahPoint</span><span class="logo-urdu">پاک نکاح پوائنٹ</span><span class="logo-tag">Professional Matchmaking</span></div></div>
  <div class="nav-label">Main Menu</div>
  <ul class="nav-list">
    <li><a href="../index.html" class="nav-item"><span class="ni">⌂</span>Dashboard</a></li>
    <li><a href="register.html?gender=boy" class="nav-item"><span class="ni">♂</span>Register Boy</a></li>
    <li><a href="register.html?gender=girl" class="nav-item"><span class="ni">♀</span>Register Girl</a></li>
    <li><a href="profiles.html" class="nav-item"><span class="ni">▤</span>All Profiles</a></li>
    <li><a href="matching.html" class="nav-item"><span class="ni">❤</span>Smart Matching</a></li>
    <li><a href="search.html" class="nav-item"><span class="ni">⌕</span>Advanced Search</a></li>
  </ul>
  <div class="nav-label">Tools</div>
  <ul class="nav-list">
    <li><a href="admin.html" class="nav-item"><span class="ni">⚙</span>Admin Panel</a></li>
    <li><a href="gallery.html" class="nav-item active"><span class="ni">⊞</span>Photo Gallery</a></li>
  </ul>
  <div class="sidebar-footer">PNP v2.0 • 2025</div>
</nav>

<main class="main-content">
  <header class="topbar">
    <div class="topbar-left"><button class="toggle-btn" onclick="toggleSidebar()">☰</button><div class="breadcrumb"><span>PakNikahPoint</span> › <strong>Photo Gallery</strong></div></div>
    <div class="topbar-right">
      <div class="qs-wrap">
        <span class="qs-icon">⌕</span>
        <input type="text" class="qs-input" id="gallerySearch" placeholder="Search…" oninput="filterGallery()">
      </div>
      <span class="topbar-date" id="topDate"></span>
      <span class="admin-chip">Admin</span>
    </div>
  </header>

  <div class="page-body">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px;">
      <div>
        <h1 style="font-family:'Cinzel',serif;font-size:22px;color:var(--green-deep);">Photo Gallery</h1>
        <div id="galleryCount" style="font-size:13px;color:var(--text-light);"></div>
      </div>
      <div class="tab-bar" style="margin:0;">
        <button class="tab-btn active" id="gTabAll"  onclick="setGFilter('all',this)">All</button>
        <button class="tab-btn"        id="gTabBoys" onclick="setGFilter('boy',this)">♂ Boys</button>
        <button class="tab-btn"        id="gTabGirls"onclick="setGFilter('girl',this)">♀ Girls</button>
        <button class="tab-btn"        id="gTabPhoto"onclick="setGFilter('photo',this)">📷 With Photo</button>
      </div>
    </div>

    <div class="photo-gallery-grid" id="galleryGrid">
      <div class="loading-spinner"></div>
    </div>
  </div>
</main>

<!-- Lightbox -->
<div class="modal-overlay" id="lightbox" onclick="closeModal('lightbox')">
  <div style="background:white;border-radius:14px;max-width:520px;width:90%;overflow:hidden;" onclick="event.stopPropagation()">
    <div style="position:relative;">
      <img id="lightboxImg" style="width:100%;max-height:400px;object-fit:cover;display:none;" alt="">
      <div id="lightboxPlaceholder" style="height:300px;display:flex;align-items:center;justify-content:center;font-size:96px;background:var(--green-pale);"></div>
      <button onclick="closeModal('lightbox')" style="position:absolute;top:12px;right:12px;background:rgba(0,0,0,0.5);color:white;border:none;border-radius:50%;width:32px;height:32px;cursor:pointer;font-size:16px;">✕</button>
    </div>
    <div style="padding:20px;" id="lightboxInfo"></div>
    <div style="padding:0 20px 20px;display:flex;gap:10px;">
      <button id="lbViewBtn" class="btn-primary" style="padding:8px 16px;font-size:13px;">View Full Profile</button>
      <button id="lbMatchBtn" class="btn-gold" style="padding:8px 16px;font-size:13px;">❤ Find Match</button>
      <button id="lbWaBtn" class="btn-outline" style="padding:8px 16px;font-size:13px;">📱 WhatsApp</button>
    </div>
  </div>
</div>

<script src="../js/db.js">
</script>
<script src="../js/daily.js"></script>
<script src="../js/app.js"></script>
<script>
let gFilter = 'all';
let allProfiles = [];

document.addEventListener('DOMContentLoaded', () => {
  allProfiles = [...PNP_DB.getBoys(), ...PNP_DB.getGirls()];
  renderGallery(allProfiles);
});

function setGFilter(f, btn) {
  gFilter = f;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  filterGallery();
}

function filterGallery() {
  const q = document.getElementById('gallerySearch').value.toLowerCase();
  let data = allProfiles;
  if (gFilter === 'boy')   data = data.filter(p => p.gender === 'boy');
  if (gFilter === 'girl')  data = data.filter(p => p.gender === 'girl');
  if (gFilter === 'photo') data = data.filter(p => p.photo && p.photo.startsWith('data:'));
  if (q) data = data.filter(p =>
    p.name?.toLowerCase().includes(q) || p.pnpCode?.toLowerCase().includes(q) || p.city?.toLowerCase().includes(q)
  );
  renderGallery(data);
}

function renderGallery(profiles) {
  const grid = document.getElementById('galleryGrid');
  document.getElementById('galleryCount').textContent = `${profiles.length} profile${profiles.length!==1?'s':''}`;

  if (!profiles.length) {
    grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:60px;color:var(--text-light);">
      <div style="font-size:48px;margin-bottom:12px;">📷</div>
      <div>No profiles found</div>
    </div>`;
    return;
  }

  grid.innerHTML = profiles.map(p => {
    const isGirl = p.gender === 'girl';
    const hasPhoto = p.photo && p.photo.startsWith('data:');
    const borderColor = isGirl ? 'var(--rose)' : 'var(--blue)';
    return `<div class="gallery-item" style="border-color:${borderColor};" onclick="openLightbox('${p.pnpCode}')">
      ${hasPhoto
        ? `<img src="${p.photo}" alt="${p.name}" style="width:100%;height:100%;object-fit:cover;">`
        : `<div style="font-size:72px;color:rgba(0,0,0,0.1);">${isGirl?'♀':'♂'}</div>`
      }
      <div class="gallery-item-label">
        <div style="font-size:10px;color:rgba(255,255,255,0.7);font-family:'Cinzel',serif;">${p.pnpCode}</div>
        <div>${p.name}</div>
        <div style="font-size:11px;opacity:0.8">${p.age} yrs • ${p.city||'—'}</div>
      </div>
    </div>`;
  }).join('');
}

function openLightbox(code) {
  const p = PNP_DB.getProfileByCode(code);
  if (!p) return;
  const isGirl = p.gender === 'girl';
  const hasPhoto = p.photo && p.photo.startsWith('data:');

  const img = document.getElementById('lightboxImg');
  const ph  = document.getElementById('lightboxPlaceholder');
  if (hasPhoto) {
    img.src = p.photo; img.style.display = 'block'; ph.style.display = 'none';
  } else {
    img.style.display = 'none'; ph.style.display = 'flex'; ph.textContent = isGirl ? '♀' : '♂';
  }

  document.getElementById('lightboxInfo').innerHTML = `
    <div style="font-family:'Cinzel',serif;font-size:11px;color:var(--gold);margin-bottom:4px;">${p.pnpCode}</div>
    <div style="font-family:'Cinzel',serif;font-size:18px;font-weight:700;color:var(--green-deep);">${p.name}</div>
    <div style="font-size:13px;color:var(--text-light);margin-top:4px;">${p.age} yrs • ${p.city||'—'} • ${p.caste||'—'}</div>
    <div style="display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;">
      <span style="background:var(--green-pale);color:var(--green-mid);padding:3px 10px;border-radius:10px;font-size:12px;">${p.education||'—'}</span>
      <span style="background:var(--gold-pale);color:var(--gold);padding:3px 10px;border-radius:10px;font-size:12px;">${p.profession||'—'}</span>
      <span style="background:var(--cream);color:var(--text-mid);padding:3px 10px;border-radius:10px;font-size:12px;">${p.sect||'—'}</span>
    </div>`;

  document.getElementById('lbViewBtn').onclick  = () => { viewProfile(code); closeModal('lightbox'); };
  document.getElementById('lbMatchBtn').onclick  = () => findMatchFor(code);
  document.getElementById('lbWaBtn').onclick     = () => shareOnWhatsApp(code);
  openModal('lightbox');
}
</script>
<script>
if("serviceWorker" in navigator){
  navigator.serviceWorker.register("/PakNikahPoint/sw.js").then(r=>console.log("SW OK")).catch(e=>console.log("SW Err",e));
}
</script>
</body>
</html>
